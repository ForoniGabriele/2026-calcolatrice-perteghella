name: Post Build (Sum Test)

on:
  workflow_run:
    workflows: ["Python application"]
    types:
      - completed

jobs:
  sum:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Calculate sum
        run: |
          python calcolatrice.py 1 2